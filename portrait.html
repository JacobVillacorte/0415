<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portrait for Us</title>
  <meta name="description" content="A portrait page for our anniversary.">
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #020202;
      --bg-2: #0d0d0d;
      --bg-3: #1b1b1b;
      --ink: #f2f2f2;
      --soft: #cfcfcf;
      --accent: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Consolas, "Courier New", monospace;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.08), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow: hidden;
    }

    .frame {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      padding: 1rem;
    }

    .topbar,
    .controls,
    .caption {
      width: min(960px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.35rem 0;
    }

    a, button, input { font: inherit; }

    .back {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.6rem 1rem;
      border-radius: 999px;
    }

    .title {
      margin: 0;
      font-size: clamp(1rem, 2.6vw, 1.35rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .subtle {
      color: rgba(255, 255, 255, 0.5);
    }

    .portrait-stage {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.62);
      position: relative;
    }

    .portrait-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.18) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .portrait-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 68svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
    }

    .portrait-wrap:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .caption {
      text-align: center;
      max-width: 680px;
      color: var(--soft);
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      margin-top: -0.3rem;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding-bottom: 0.5rem;
    }

    .controls button {
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.06);
      padding: 0.65rem 1rem;
      border-radius: 999px;
      cursor: pointer;
    }

    .controls button:hover { background: rgba(255, 255, 255, 0.12); }

    .controls input[type="range"] {
      width: min(380px, 78vw);
      accent-color: var(--accent);
    }

    .hint {
      margin: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
      .frame { padding: 0.8rem; }
      .portrait-wrap { min-height: 60svh; }
      .ink-overlay span { font-size: clamp(1.75rem, 10vw, 3.2rem); }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="topbar">
      <a class="back" href="index.html">Back to anniversary</a>
      <h1 class="title">Portrait memory</h1>
      <div></div>
    </div>

    <div class="portrait-stage">
      <div id="portraitWrap" class="portrait-wrap">
        <canvas id="portraitCanvas" aria-label="Portrait memory"></canvas>
      </div>
    </div>

    <div class="controls" aria-label="Portrait controls">
      <button id="zoomOutBtn" type="button">Zoom out</button>
      <input id="zoomRange" type="range" min="0.8" max="2.4" step="0.01" value="1" aria-label="Zoom level" />
      <button id="zoomInBtn" type="button">Zoom in</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>
    <p class="hint">Text-only portrait: every detail is built from repeated "I love you".</p>
  </div>

  <script>
    const wrap = document.getElementById('portraitWrap');
    const canvas = document.getElementById('portraitCanvas');
    const ctx = canvas.getContext('2d');
    const zoomRange = document.getElementById('zoomRange');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetBtn = document.getElementById('resetBtn');
    const source = new Image();
    source.src = 'picjah1.png';

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let activePointers = new Map();
    let dragPointerId = null;
    let panStartX = 0;
    let panStartY = 0;
    let originOffsetX = 0;
    let originOffsetY = 0;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let renderQueued = false;
    let imageReady = false;

    function resizeCanvas() {
      const rect = wrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      requestRender();
    }

    function applyTransform() {
      zoomRange.value = String(scale);
      requestRender();
    }

    function requestRender() {
      if (renderQueued) return;
      renderQueued = true;
      window.requestAnimationFrame(() => {
        renderQueued = false;
        drawPortrait();
      });
    }

    function drawPortrait() {
      if (!imageReady) return;

      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, width, height);

      const baseCell = Math.max(7, Math.min(width, height) / 40);
      const cellSize = baseCell / scale;
      const columns = Math.ceil(width / cellSize) + 2;
      const rows = Math.ceil(height / cellSize) + 2;

      const sampleCanvas = document.createElement('canvas');
      sampleCanvas.width = columns;
      sampleCanvas.height = rows;
      const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
      const sourceRatio = source.width / source.height;
      const sampleRatio = columns / rows;
      let cropWidth = source.width;
      let cropHeight = source.height;
      let cropX = 0;
      let cropY = 0;

      if (sourceRatio > sampleRatio) {
        cropWidth = source.height * sampleRatio;
        cropX = (source.width - cropWidth) / 2;
      } else {
        cropHeight = source.width / sampleRatio;
        cropY = (source.height - cropHeight) / 2;
      }

      sampleCtx.drawImage(source, cropX, cropY, cropWidth, cropHeight, 0, 0, columns, rows);
      const pixels = sampleCtx.getImageData(0, 0, columns, rows).data;

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const centerX = width / 2 + offsetX;
      const centerY = height / 2 + offsetY;
      const sourceLeft = centerX - (columns * cellSize) / 2;
      const sourceTop = centerY - (rows * cellSize) / 2;

      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < columns; x += 1) {
          const index = (y * columns + x) * 4;
          const red = pixels[index];
          const green = pixels[index + 1];
          const blue = pixels[index + 2];
          const brightness = (red + green + blue) / 3;
          const darkness = 1 - brightness / 255;

          if (darkness < 0.08) {
            continue;
          }

          const spacingStep = darkness > 0.72 ? 1 : darkness > 0.45 ? 2 : 3;
          if ((x + y) % spacingStep !== 0) {
            continue;
          }

          const wordOpacity = Math.min(1, 0.14 + darkness * 0.96);
          const wordSize = cellSize * (0.56 + darkness * 0.82);
          const drawX = sourceLeft + x * cellSize;
          const drawY = sourceTop + y * cellSize;

          ctx.font = `700 ${wordSize}px Consolas`;
          ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(0.96, 0.12 + wordOpacity * 0.95)})`;
          ctx.shadowColor = 'rgba(0, 0, 0, 0.98)';
          ctx.shadowBlur = Math.max(0, wordSize * 0.06);

          const drawRepeats = darkness > 0.82 ? 3 : darkness > 0.58 ? 2 : 1;
          for (let repeat = 0; repeat < drawRepeats; repeat += 1) {
            const shiftY = (repeat - (drawRepeats - 1) / 2) * wordSize * 0.34;
            ctx.fillText('I love you', drawX, drawY + shiftY);
          }
        }
      }
    }

    function resetView() {
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      applyTransform();
    }

    function clampScale(value) {
      return Math.min(2.4, Math.max(0.8, value));
    }

    zoomRange.addEventListener('input', () => {
      scale = clampScale(Number(zoomRange.value));
      applyTransform();
    });

    zoomInBtn.addEventListener('click', () => {
      scale = clampScale(scale + 0.12);
      applyTransform();
    });

    zoomOutBtn.addEventListener('click', () => {
      scale = clampScale(scale - 0.12);
      applyTransform();
    });

    resetBtn.addEventListener('click', resetView);

    function setDragOrigin(pointerId, x, y) {
      dragPointerId = pointerId;
      panStartX = x;
      panStartY = y;
      originOffsetX = offsetX;
      originOffsetY = offsetY;
    }

    function updateFromPointers() {
      if (activePointers.size === 1 && dragPointerId !== null) {
        const point = activePointers.get(dragPointerId);
        if (!point) return;
        offsetX = originOffsetX + (point.x - panStartX);
        offsetY = originOffsetY + (point.y - panStartY);
        applyTransform();
        return;
      }

      if (activePointers.size >= 2) {
        const points = Array.from(activePointers.values());
        const distance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        if (!pinchStartDistance) {
          pinchStartDistance = distance;
          pinchStartScale = scale;
        }
        scale = clampScale(pinchStartScale * (distance / pinchStartDistance));
        applyTransform();
      }
    }

    wrap.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

      if (activePointers.size === 1) {
        setDragOrigin(event.pointerId, event.clientX, event.clientY);
        wrap.setPointerCapture(event.pointerId);
      }

      if (activePointers.size === 2) {
        const points = Array.from(activePointers.values());
        pinchStartDistance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        pinchStartScale = scale;
      }
    });

    wrap.addEventListener('pointermove', (event) => {
      const point = activePointers.get(event.pointerId);
      if (!point) return;
      point.x = event.clientX;
      point.y = event.clientY;
      activePointers.set(event.pointerId, point);
      updateFromPointers();
    });

    wrap.addEventListener('pointerup', (event) => {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 1) {
        const remaining = Array.from(activePointers.entries())[0];
        if (remaining) {
          dragPointerId = remaining[0];
          panStartX = remaining[1].x;
          panStartY = remaining[1].y;
          originOffsetX = offsetX;
          originOffsetY = offsetY;
        }
      } else if (activePointers.size === 0) {
        dragPointerId = null;
        pinchStartDistance = 0;
        pinchStartScale = 1;
      }
    });

    wrap.addEventListener('pointercancel', (event) => {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 0) {
        dragPointerId = null;
        pinchStartDistance = 0;
        pinchStartScale = 1;
      }
    });

    wrap.addEventListener('wheel', (event) => {
      event.preventDefault();
      scale = clampScale(scale + (event.deltaY < 0 ? 0.08 : -0.08));
      applyTransform();
    }, { passive: false });

    source.onload = () => {
      imageReady = true;
      resizeCanvas();
      applyTransform();
    };

    window.addEventListener('resize', resizeCanvas);

    resetView();
  </script>
</body>
</html>
