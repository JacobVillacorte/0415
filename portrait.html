<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pure CSS text portrait for our anniversary." />
  <title>Portrait | Anniversary</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --subject-image: url('./picjah1.png');
      --black: #070707;
      --regular: 11px;
      --brightness: 0.95;
      --grayscale: 1;
      --invert: 0;
      --text: #f4f4f4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    p {
      overflow: hidden;
      overflow-anchor: none;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body,
    p {
      margin: 0;
    }

    .back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 2;
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1rem;
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }

    .page {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: start;
      gap: 1rem;
      padding: 1rem;
    }

    .portrait-stage {
      width: min(92vw, 560px);
      aspect-ratio: 3 / 4;
      margin: 1rem auto 0;
      padding: 0.7rem;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.62);
      position: relative;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .portrait-shell {
      position: absolute;
      inset: 0.7rem;
      transform-origin: center center;
      will-change: transform;
      transform: translate(var(--offset-x, 0px), var(--offset-y, 0px)) scale(var(--scale, 1));
    }

    p {
      position: absolute;
      inset: 0;
      margin: 0;
      padding: 0;
      background-attachment: scroll;
      background-position: center 16%;
      background-repeat: no-repeat;
      background-size: cover;
      color: transparent;
      background-clip: text;
      background-image: var(--subject-image);
      filter: brightness(var(--brightness)) grayscale(var(--grayscale)) invert(var(--invert)) contrast(1.18);
      font-family: 'Inter', sans-serif;
      font-size: var(--regular);
      line-height: var(--regular);
      text-align: justify;
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      white-space: normal;
      word-break: normal;
      overflow-wrap: normal;
    }

    .controls {
      width: min(92vw, 560px);
      margin: 0 auto 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      justify-content: center;
      align-items: center;
    }

    .controls button {
      font: inherit;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      padding: 0.65rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .controls button:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .controls input[type="range"] {
      width: min(360px, 80vw);
      accent-color: #ffffff;
    }

    @media (max-width: 720px) {
      :root {
        --regular: 5px;
      }

      .page {
        padding: 0.85rem;
      }

      .portrait-stage {
        width: min(94vw, 100%);
        margin-top: 0.9rem;
        padding: 0.55rem;
        border-radius: 24px;
      }

      .portrait-shell {
        inset: 0.55rem;
      }

      .controls {
        width: min(94vw, 100%);
      }

      .back {
        top: 12px;
        left: 12px;
        padding: 0.5rem 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="index.html">Back to anniversary</a>
    <div id="portraitStage" class="portrait-stage">
      <div id="portraitShell" class="portrait-shell">
        <p id="text" title="Powered by CSS Text Portrait Builder">Loading portrait text...</p>
      </div>
    </div>
    <div class="controls" aria-label="Portrait controls">
      <button id="zoomOutBtn" type="button">Zoom out</button>
      <input id="zoomRange" type="range" min="0.7" max="4" step="0.01" value="1" aria-label="Zoom level" />
      <button id="zoomInBtn" type="button">Zoom in</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const portraitStage = document.getElementById('portraitStage');
    const portraitShell = document.getElementById('portraitShell');
    const portraitText = document.getElementById('text');
    const zoomRange = document.getElementById('zoomRange');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetBtn = document.getElementById('resetBtn');
    const portraitTextSource = (
      (window.ANNIVERSARY_CONFIG && window.ANNIVERSARY_CONFIG.portraitText) ||
      'I love you I love you I love you I love you I love you I love you I love you'
    ).replace(/\s+/g, ' ').trim();

    const textCount = portraitTextSource.length;
    const minScale = 0.7;
    const maxScale = 4;

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let dragPointerId = null;
    let dragStartX = 0;
    let dragStartY = 0;
    let startOffsetX = 0;
    let startOffsetY = 0;

    const title = document.createElement('title');
    title.textContent = 'Anniversary | CSS Text Portrait';
    document.head.appendChild(title);

    function getTextWidth(text, font) {
      const canvas = getTextWidth.canvas || (getTextWidth.canvas = document.createElement('canvas'));
      const context = canvas.getContext('2d');
      context.font = font;
      return context.measureText(text).width;
    }

    function getFontTextWidthAverage(font) {
      const chars = "1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ .,\'()?!\"";
      let totalWidth = 0;
      let count = 0;

      for (const char of chars) {
        totalWidth += getTextWidth(char, font);
        count++;
      }

      return Math.floor(totalWidth / count);
    }

    function getStyle(element, prop) {
      return window.getComputedStyle(element, null).getPropertyValue(prop);
    }

    function getFontDescriptors(element = document.body) {
      const fontWeight = getStyle(element, 'font-weight') || 'normal';
      const fontSize = getStyle(element, 'font-size') || '16px';
      const fontFamily = getStyle(element, 'font-family') || 'Inter, sans-serif';
      return `${fontWeight} ${fontSize} ${fontFamily}`;
    }

    function computeMaxChar(percent = 100) {
      if (percent < 1 || percent > 100) {
        throw new Error('Invalid fill percentage!');
      }

      const fontSize = parseInt(getStyle(portraitText, 'font-size').match(/\d+/)[0], 10);
      const stageWidth = portraitShell.clientWidth || portraitStage.clientWidth || window.innerWidth;
      const stageHeight = portraitShell.clientHeight || portraitStage.clientHeight || window.innerHeight;
      const maxLineY = Math.floor((stageHeight / fontSize) * (percent / 100));
      const maxCharX = Math.floor(stageWidth / (getFontTextWidthAverage(getFontDescriptors(portraitText)) - 1));

      return Math.ceil(maxCharX * maxLineY * Math.max(1, scale));
    }

    function setText() {
      const maxChar = computeMaxChar();
      portraitText.textContent = `${portraitTextSource} `.repeat(Math.ceil(maxChar / textCount)).substring(0, maxChar + 1);
    }

    function clampScale(value) {
      return Math.min(maxScale, Math.max(minScale, value));
    }

    function clampOffset(value, axis) {
      const stageRect = portraitStage.getBoundingClientRect();
      const baseWidth = portraitShell.clientWidth || stageRect.width;
      const baseHeight = portraitShell.clientHeight || stageRect.height;
      const scaledWidth = baseWidth * scale;
      const scaledHeight = baseHeight * scale;
      const maxX = Math.max(0, (scaledWidth - stageRect.width) / 2);
      const maxY = Math.max(0, (scaledHeight - stageRect.height) / 2);
      const limit = axis === 'x' ? maxX : maxY;
      return Math.min(limit, Math.max(-limit, value));
    }

    function applyTransform() {
      offsetX = clampOffset(offsetX, 'x');
      offsetY = clampOffset(offsetY, 'y');
      portraitShell.style.setProperty('--scale', String(scale));
      portraitShell.style.setProperty('--offset-x', `${offsetX}px`);
      portraitShell.style.setProperty('--offset-y', `${offsetY}px`);
      zoomRange.value = String(scale);
    }

    function rebuildPortrait() {
      setText();
      applyTransform();
    }

    function resetView() {
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      rebuildPortrait();
    }

    portraitStage.addEventListener('pointerdown', (event) => {
      dragPointerId = event.pointerId;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      startOffsetX = offsetX;
      startOffsetY = offsetY;
      portraitStage.setPointerCapture(event.pointerId);
    });

    portraitStage.addEventListener('pointermove', (event) => {
      if (dragPointerId !== event.pointerId) {
        return;
      }

      offsetX = startOffsetX + (event.clientX - dragStartX);
      offsetY = startOffsetY + (event.clientY - dragStartY);
      applyTransform();
    });

    portraitStage.addEventListener('pointerup', (event) => {
      if (dragPointerId === event.pointerId) {
        dragPointerId = null;
      }
    });

    portraitStage.addEventListener('pointercancel', () => {
      dragPointerId = null;
    });

    zoomRange.addEventListener('input', () => {
      scale = clampScale(Number(zoomRange.value));
      rebuildPortrait();
    });

    zoomInBtn.addEventListener('click', () => {
      scale = clampScale(scale + 0.12);
      rebuildPortrait();
    });

    zoomOutBtn.addEventListener('click', () => {
      scale = clampScale(scale - 0.12);
      rebuildPortrait();
    });

    resetBtn.addEventListener('click', resetView);

    setText();
    window.addEventListener('load', setText);
    window.addEventListener('resize', rebuildPortrait);
  </script>
</body>
</html>
