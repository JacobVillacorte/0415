<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portrait for Us</title>
  <meta name="description" content="A portrait page for our anniversary.">
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #17050a;
      --bg-2: #3d0d17;
      --bg-3: #7e2031;
      --ink: #fff0e8;
      --soft: #f6cfc5;
      --accent: #ff9b8d;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Georgia, serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 150, 145, 0.18), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255, 206, 188, 0.12), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow: hidden;
    }

    .frame {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      padding: 1rem;
    }

    .topbar,
    .controls,
    .caption {
      width: min(960px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.35rem 0;
    }

    a, button, input { font: inherit; }

    .back {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid rgba(255, 240, 232, 0.28);
      background: rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1rem;
      border-radius: 999px;
    }

    .title {
      margin: 0;
      font-size: clamp(1rem, 2.6vw, 1.35rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .portrait-stage {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255, 240, 232, 0.18);
      background: rgba(255, 230, 216, 0.06);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    .portrait-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.18) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .portrait-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 68svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .portrait-wrap img {
      max-width: none;
      width: min(92vw, 760px);
      height: auto;
      transform: scale(1);
      transform-origin: center center;
      transition: transform 120ms ease;
      filter: contrast(1.05) saturate(0.9) brightness(1.02);
    }

    .ink-overlay {
      position: absolute;
      inset: auto 0 0;
      padding: 1rem 1.2rem 1.3rem;
      text-align: center;
      z-index: 3;
      background: linear-gradient(to top, rgba(12, 2, 5, 0.78), transparent);
    }

    .ink-overlay span {
      display: inline-block;
      font-size: clamp(2rem, 6vw, 4.4rem);
      line-height: 0.9;
      letter-spacing: 0.06em;
      color: transparent;
      -webkit-text-stroke: 1.4px rgba(255, 240, 232, 0.85);
      text-shadow: 0 0 8px rgba(255, 170, 161, 0.18);
      font-weight: 700;
    }

    .caption {
      text-align: center;
      max-width: 680px;
      color: var(--soft);
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      margin-top: -0.3rem;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding-bottom: 0.5rem;
    }

    .controls button {
      border: 1px solid rgba(255, 240, 232, 0.24);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.65rem 1rem;
      border-radius: 999px;
      cursor: pointer;
    }

    .controls button:hover { background: rgba(255, 255, 255, 0.12); }

    .controls input[type="range"] {
      width: min(380px, 78vw);
      accent-color: var(--accent);
    }

    .hint {
      margin: 0;
      text-align: center;
      color: rgba(246, 207, 197, 0.78);
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
      .frame { padding: 0.8rem; }
      .portrait-wrap { min-height: 60svh; }
      .ink-overlay span { font-size: clamp(1.75rem, 10vw, 3.2rem); }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="topbar">
      <a class="back" href="index.html">Back to anniversary</a>
      <h1 class="title">Portrait memory</h1>
      <div></div>
    </div>

    <div class="portrait-stage">
      <div id="portraitWrap" class="portrait-wrap">
        <img id="portraitImage" src="picjah1.png" alt="Portrait memory" />
        <div class="ink-overlay" aria-hidden="true"><span>I LOVE YOU</span></div>
      </div>
    </div>

    <div class="controls" aria-label="Portrait controls">
      <button id="zoomOutBtn" type="button">Zoom out</button>
      <input id="zoomRange" type="range" min="0.8" max="2.4" step="0.01" value="1" aria-label="Zoom level" />
      <button id="zoomInBtn" type="button">Zoom in</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>
    <p class="hint">Pinch, drag, or use the controls to frame the portrait.</p>
  </div>

  <script>
    const wrap = document.getElementById('portraitWrap');
    const img = document.getElementById('portraitImage');
    const zoomRange = document.getElementById('zoomRange');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetBtn = document.getElementById('resetBtn');

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let panStartX = 0;
    let panStartY = 0;
    let originOffsetX = 0;
    let originOffsetY = 0;
    let panning = false;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;

    function applyTransform() {
      img.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      zoomRange.value = String(scale);
    }

    function resetView() {
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      applyTransform();
    }

    function clampScale(value) {
      return Math.min(2.4, Math.max(0.8, value));
    }

    zoomRange.addEventListener('input', () => {
      scale = clampScale(Number(zoomRange.value));
      applyTransform();
    });

    zoomInBtn.addEventListener('click', () => {
      scale = clampScale(scale + 0.12);
      applyTransform();
    });

    zoomOutBtn.addEventListener('click', () => {
      scale = clampScale(scale - 0.12);
      applyTransform();
    });

    resetBtn.addEventListener('click', resetView);

    wrap.addEventListener('pointerdown', (event) => {
      panning = true;
      panStartX = event.clientX;
      panStartY = event.clientY;
      originOffsetX = offsetX;
      originOffsetY = offsetY;
      wrap.setPointerCapture(event.pointerId);
    });

    wrap.addEventListener('pointermove', (event) => {
      if (!panning || event.pointerType === 'touch') return;
      offsetX = originOffsetX + (event.clientX - panStartX);
      offsetY = originOffsetY + (event.clientY - panStartY);
      applyTransform();
    });

    wrap.addEventListener('pointerup', () => {
      panning = false;
    });

    wrap.addEventListener('pointercancel', () => {
      panning = false;
    });

    wrap.addEventListener('wheel', (event) => {
      event.preventDefault();
      scale = clampScale(scale + (event.deltaY < 0 ? 0.08 : -0.08));
      applyTransform();
    }, { passive: false });

    function distance(touchA, touchB) {
      return Math.hypot(touchA.clientX - touchB.clientX, touchA.clientY - touchB.clientY);
    }

    wrap.addEventListener('touchstart', (event) => {
      if (event.touches.length === 2) {
        pinchStartDistance = distance(event.touches[0], event.touches[1]);
        pinchStartScale = scale;
      }
    }, { passive: true });

    wrap.addEventListener('touchmove', (event) => {
      if (event.touches.length === 2) {
        event.preventDefault();
        const pinchDistance = distance(event.touches[0], event.touches[1]);
        scale = clampScale(pinchStartScale * (pinchDistance / pinchStartDistance));
        applyTransform();
      }
    }, { passive: false });

    resetView();
  </script>
</body>
</html>
