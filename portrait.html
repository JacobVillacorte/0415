<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portrait for Us</title>
  <meta name="description" content="A portrait page for our anniversary.">
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #020202;
      --bg-2: #0d0d0d;
      --bg-3: #1b1b1b;
      --ink: #f2f2f2;
      --soft: #cfcfcf;
      --accent: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Consolas, "Courier New", monospace;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.08), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow: hidden;
    }

    .frame {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      padding: 1rem;
    }

    .topbar,
    .controls,
    .caption {
      width: min(960px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.35rem 0;
    }

    a, button, input { font: inherit; }

    .back {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.6rem 1rem;
      border-radius: 999px;
    }

    .title {
      margin: 0;
      font-size: clamp(1rem, 2.6vw, 1.35rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .subtle {
      color: rgba(255, 255, 255, 0.5);
    }

    .portrait-stage {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.62);
      position: relative;
    }

    .portrait-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.18) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .portrait-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 68svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
    }

    .portrait-wrap:active {
      cursor: grabbing;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .caption {
      text-align: center;
      max-width: 680px;
      color: var(--soft);
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      margin-top: -0.3rem;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding-bottom: 0.5rem;
    }

    .controls button {
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.06);
      padding: 0.65rem 1rem;
      border-radius: 999px;
      cursor: pointer;
    }

    .controls button:hover { background: rgba(255, 255, 255, 0.12); }

    .controls input[type="range"] {
      width: min(380px, 78vw);
      accent-color: var(--accent);
    }

    .hint {
      margin: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
      .frame { padding: 0.8rem; }
      .portrait-wrap { min-height: 60svh; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="topbar">
      <a class="back" href="index.html">Back to anniversary</a>
      <h1 class="title">Portrait memory</h1>
      <div></div>
    </div>

    <div class="portrait-stage">
      <div id="portraitWrap" class="portrait-wrap">
        <canvas id="portraitCanvas" aria-label="Portrait memory"></canvas>
      </div>
    </div>

    <div class="controls" aria-label="Portrait controls">
      <button id="zoomOutBtn" type="button">Zoom out</button>
      <input id="zoomRange" type="range" min="0.7" max="7" step="0.01" value="1" aria-label="Zoom level" />
      <button id="zoomInBtn" type="button">Zoom in</button>
      <button id="resetBtn" type="button">Reset</button>
      <button id="qualityToggleBtn" type="button">Quality: Standard</button>
    </div>
    <p class="hint">Text-only portrait from your photo: zoom in to see the words, zoom out to see the face.</p>
  </div>

  <script src="config.js"></script>
  <script>
    const wrap = document.getElementById('portraitWrap');
    const canvas = document.getElementById('portraitCanvas');
    const ctx = canvas.getContext('2d');
    const zoomRange = document.getElementById('zoomRange');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetBtn = document.getElementById('resetBtn');
    const qualityToggleBtn = document.getElementById('qualityToggleBtn');
    const source = new Image();
    source.src = 'picjah1.png';
    const lyricText = (
      (window.ANNIVERSARY_CONFIG && window.ANNIVERSARY_CONFIG.portraitText) ||
      'I love you I love you I love you I love you I love you I love you'
    ).replace(/\s+/g, ' ').trim() + ' ';
    const lyricWords = lyricText.split(' ').filter(Boolean);

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let activePointers = new Map();
    let dragPointerId = null;
    let panStartX = 0;
    let panStartY = 0;
    let originOffsetX = 0;
    let originOffsetY = 0;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let renderQueued = false;
    let imageReady = false;
    let grayPixels = null;
    let edgePixels = null;
    let grayWidth = 0;
    let grayHeight = 0;
    let imageRatio = 1;
    let ultraMode = false;

    function resizeCanvas() {
      const rect = wrap.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      requestRender();
    }

    function applyTransform() {
      zoomRange.value = String(scale);
      requestRender();
    }

    function requestRender() {
      if (renderQueued) return;
      renderQueued = true;
      window.requestAnimationFrame(() => {
        renderQueued = false;
        drawPortrait();
      });
    }

    function drawPortrait() {
      if (!imageReady) return;

      const rect = canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, width, height);

      const viewRatio = width / height;
      let drawW;
      let drawH;
      if (imageRatio > viewRatio) {
        drawW = width * 0.98 * scale;
        drawH = drawW / imageRatio;
      } else {
        drawH = height * 0.97 * scale;
        drawW = drawH * imageRatio;
      }

      const left = width / 2 - drawW / 2 + offsetX;
      const top = height / 2 - drawH / 2 + offsetY;
      const baseSize = ultraMode ? 3.9 : 4.6;
      const zoomReveal = Math.max(0, Math.min(1, (scale - 1) / 2.8));
      const baseFont = Math.max(baseSize, Math.min(width, height) / (ultraMode ? 210 : 178));
      // Denser micro-text at zoom-out, progressively readable on zoom-in.
      const fontSize = baseFont * Math.pow(scale, ultraMode ? 0.9 : 0.86);
      const lineH = fontSize * 1.08;
      const rows = Math.ceil(height / lineH) + 3;

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `700 ${fontSize}px Consolas`;
      ctx.shadowColor = 'rgba(0, 0, 0, 0.96)';
      ctx.shadowBlur = Math.max(0.2, fontSize * 0.05);

      // Cache text widths once per frame to keep horizontal word flow stable.
      const widthCache = new Map();
      lyricWords.forEach((word) => {
        if (!widthCache.has(word)) {
          widthCache.set(word, ctx.measureText(word).width);
        }
      });

      const startX = -fontSize * 2;
      const startY = -lineH;

      let pointer = 0;
      for (let row = 0; row < rows; row += 1) {
        const drawY = startY + row * lineH;
        let drawX = startX;
        // Keep line-like paragraph flow with a row offset.
        pointer = (pointer + row * 3) % lyricWords.length;

        while (drawX < width + fontSize * 2) {
          const px = (drawX - left) / drawW;
          const py = (drawY - top) / drawH;
          if (px < 0 || py < 0 || px >= 1 || py >= 1) {
            drawX += fontSize * 2.4;
            continue;
          }

          const sx = Math.min(grayWidth - 1, Math.max(0, Math.floor(px * grayWidth)));
          const sy = Math.min(grayHeight - 1, Math.max(0, Math.floor(py * grayHeight)));
          const lum = grayPixels[sy * grayWidth + sx] / 255;
          const baseDarkness = Math.min(1, Math.max(0, Math.pow(1 - lum, ultraMode ? 1.42 : 1.34)));
          const edge = edgePixels ? edgePixels[sy * grayWidth + sx] / 255 : 0;
          const darkness = Math.min(1, baseDarkness * (ultraMode ? 0.9 : 1) + edge * (ultraMode ? 0.58 : 0.32));
          const word = lyricWords[pointer % lyricWords.length] || 'love';
          const wordW = widthCache.get(word) || ctx.measureText(word).width;
          pointer += 1;

          // Strict density mapping from source luminance.
          const alpha = (0.02 + darkness * 0.98) * (1 - zoomReveal * 0.22);
          if (darkness < 0.08) {
            drawX += wordW * 0.95;
            continue;
          }
          if (darkness < 0.24 && ((row + Math.floor(drawX)) % 3 !== 0)) {
            drawX += wordW * 0.9;
            continue;
          }
          if (darkness < 0.45 && ((row + Math.floor(drawX)) % 2 !== 0)) {
            drawX += wordW * 0.9;
            continue;
          }

          ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, alpha)})`;
          ctx.fillText(word, drawX, drawY);

          if (zoomReveal < 0.62 && darkness > (ultraMode ? 0.56 : 0.62)) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, alpha + 0.16)})`;
            ctx.fillText(word, drawX + wordW * 0.24, drawY);
          }

          if (zoomReveal < 0.45 && darkness > (ultraMode ? 0.78 : 0.84)) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(1, alpha + 0.24)})`;
            ctx.fillText(word, drawX - wordW * 0.16, drawY + lineH * 0.1);
          }

          const spacingBase = darkness > 0.78 ? 0.08 : darkness > 0.52 ? 0.24 : darkness > 0.3 ? 0.48 : 0.92;
          const spacing = spacingBase + zoomReveal * 0.55;
          drawX += wordW + wordW * spacing;
        }
      }
    }

    function buildToneMap() {
      const maxSide = ultraMode ? 3200 : 2200;
      imageRatio = source.width / source.height;
      if (source.width >= source.height) {
        grayWidth = maxSide;
        grayHeight = Math.max(1, Math.round(maxSide / imageRatio));
      } else {
        grayHeight = maxSide;
        grayWidth = Math.max(1, Math.round(maxSide * imageRatio));
      }

      const sampleCanvas = document.createElement('canvas');
      sampleCanvas.width = grayWidth;
      sampleCanvas.height = grayHeight;
      const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
      sampleCtx.drawImage(source, 0, 0, grayWidth, grayHeight);
      const pixels = sampleCtx.getImageData(0, 0, grayWidth, grayHeight).data;
      grayPixels = new Uint8ClampedArray(grayWidth * grayHeight);
      edgePixels = new Uint8ClampedArray(grayWidth * grayHeight);

      for (let i = 0; i < grayPixels.length; i += 1) {
        const pxIndex = i * 4;
        const red = pixels[pxIndex];
        const green = pixels[pxIndex + 1];
        const blue = pixels[pxIndex + 2];
        grayPixels[i] = Math.round(0.299 * red + 0.587 * green + 0.114 * blue);
      }

      // Sobel-like edge map to emphasize fine facial features in ultra mode.
      for (let y = 1; y < grayHeight - 1; y += 1) {
        for (let x = 1; x < grayWidth - 1; x += 1) {
          const i = y * grayWidth + x;
          const gx =
            -grayPixels[i - grayWidth - 1] + grayPixels[i - grayWidth + 1] +
            -2 * grayPixels[i - 1] + 2 * grayPixels[i + 1] +
            -grayPixels[i + grayWidth - 1] + grayPixels[i + grayWidth + 1];
          const gy =
            -grayPixels[i - grayWidth - 1] - 2 * grayPixels[i - grayWidth] - grayPixels[i - grayWidth + 1] +
            grayPixels[i + grayWidth - 1] + 2 * grayPixels[i + grayWidth] + grayPixels[i + grayWidth + 1];
          const g = Math.min(255, Math.hypot(gx, gy) * 0.32);
          edgePixels[i] = g;
        }
      }
    }

    function resetView() {
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      applyTransform();
    }

    function clampScale(value) {
      return Math.min(7, Math.max(0.7, value));
    }

    zoomRange.addEventListener('input', () => {
      scale = clampScale(Number(zoomRange.value));
      applyTransform();
    });

    zoomInBtn.addEventListener('click', () => {
      scale = clampScale(scale + 0.12);
      applyTransform();
    });

    zoomOutBtn.addEventListener('click', () => {
      scale = clampScale(scale - 0.12);
      applyTransform();
    });

    resetBtn.addEventListener('click', resetView);

    qualityToggleBtn.addEventListener('click', () => {
      ultraMode = !ultraMode;
      qualityToggleBtn.textContent = ultraMode ? 'Quality: Ultra' : 'Quality: Standard';
      if (imageReady) {
        buildToneMap();
        requestRender();
      }
    });

    function setDragOrigin(pointerId, x, y) {
      dragPointerId = pointerId;
      panStartX = x;
      panStartY = y;
      originOffsetX = offsetX;
      originOffsetY = offsetY;
    }

    function updateFromPointers() {
      if (activePointers.size === 1 && dragPointerId !== null) {
        const point = activePointers.get(dragPointerId);
        if (!point) return;
        offsetX = originOffsetX + (point.x - panStartX);
        offsetY = originOffsetY + (point.y - panStartY);
        applyTransform();
        return;
      }

      if (activePointers.size >= 2) {
        const points = Array.from(activePointers.values());
        const distance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        if (!pinchStartDistance) {
          pinchStartDistance = distance;
          pinchStartScale = scale;
        }
        scale = clampScale(pinchStartScale * (distance / pinchStartDistance));
        applyTransform();
      }
    }

    wrap.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

      if (activePointers.size === 1) {
        setDragOrigin(event.pointerId, event.clientX, event.clientY);
        wrap.setPointerCapture(event.pointerId);
      }

      if (activePointers.size === 2) {
        const points = Array.from(activePointers.values());
        pinchStartDistance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        pinchStartScale = scale;
      }
    });

    wrap.addEventListener('pointermove', (event) => {
      const point = activePointers.get(event.pointerId);
      if (!point) return;
      point.x = event.clientX;
      point.y = event.clientY;
      activePointers.set(event.pointerId, point);
      updateFromPointers();
    });

    wrap.addEventListener('pointerup', (event) => {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 1) {
        const remaining = Array.from(activePointers.entries())[0];
        if (remaining) {
          dragPointerId = remaining[0];
          panStartX = remaining[1].x;
          panStartY = remaining[1].y;
          originOffsetX = offsetX;
          originOffsetY = offsetY;
        }
      } else if (activePointers.size === 0) {
        dragPointerId = null;
        pinchStartDistance = 0;
        pinchStartScale = 1;
      }
    });

    wrap.addEventListener('pointercancel', (event) => {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 0) {
        dragPointerId = null;
        pinchStartDistance = 0;
        pinchStartScale = 1;
      }
    });

    wrap.addEventListener('wheel', (event) => {
      event.preventDefault();
      scale = clampScale(scale + (event.deltaY < 0 ? 0.08 : -0.08));
      applyTransform();
    }, { passive: false });

    source.onload = () => {
      imageReady = true;
      buildToneMap();
      resizeCanvas();
      applyTransform();
    };

    window.addEventListener('resize', resizeCanvas);

    resetView();
  </script>
</body>
</html>
