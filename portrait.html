<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pure CSS text portrait for our anniversary." />
  <title>Portrait | Anniversary</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --subject-image: url('./picjah1.png');
      --black: #070707;
      --regular: 12px;
      --brightness: 0.95;
      --grayscale: 1;
      --invert: 0;
      --text: #f4f4f4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    p {
      overflow: hidden;
      overflow-anchor: none;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--black);
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    body,
    p {
      margin: 0;
    }

    .back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 2;
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      padding: 0.6rem 1rem;
      border-radius: 999px;
      backdrop-filter: blur(10px);
    }

    p {
      position: fixed;
      inset: 0;
      padding: 0;
      background-attachment: fixed;
      background-position: center 18%;
      background-repeat: no-repeat;
      background-size: cover;
      color: transparent;
      background-clip: text;
      background-image: var(--subject-image);
      filter: brightness(var(--brightness)) grayscale(var(--grayscale)) invert(var(--invert)) contrast(1.15);
      font-family: 'Inter', sans-serif;
      font-size: var(--regular);
      line-height: var(--regular);
      text-align: justify;
      -webkit-text-fill-color: transparent;
      -webkit-background-clip: text;
      white-space: normal;
      word-break: normal;
      overflow-wrap: normal;
    }

    @media (max-width: 720px) {
      :root {
        --regular: 8px;
      }

      .back {
        top: 12px;
        left: 12px;
        padding: 0.5rem 0.85rem;
      }
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">Back to anniversary</a>
  <p id="text" title="Powered by CSS Text Portrait Builder">Loading portrait text...</p>

  <script src="config.js"></script>
  <script>
    const portraitText = document.getElementById('text');
    const portraitTextSource = (
      (window.ANNIVERSARY_CONFIG && window.ANNIVERSARY_CONFIG.portraitText) ||
      'I love you I love you I love you I love you I love you I love you I love you'
    ).replace(/\s+/g, ' ').trim();

    const textCount = portraitTextSource.length;

    const title = document.createElement('title');
    title.textContent = 'Anniversary | CSS Text Portrait';
    document.head.appendChild(title);

    function getTextWidth(text, font) {
      const canvas = getTextWidth.canvas || (getTextWidth.canvas = document.createElement('canvas'));
      const context = canvas.getContext('2d');
      context.font = font;
      return context.measureText(text).width;
    }

    function getFontTextWidthAverage(font) {
      const chars = "1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ .,\'()?!\"";
      let totalWidth = 0;
      let count = 0;

      for (const char of chars) {
        totalWidth += getTextWidth(char, font);
        count++;
      }

      return Math.floor(totalWidth / count);
    }

    function getStyle(element, prop) {
      return window.getComputedStyle(element, null).getPropertyValue(prop);
    }

    function getFontDescriptors(element = document.body) {
      const fontWeight = getStyle(element, 'font-weight') || 'normal';
      const fontSize = getStyle(element, 'font-size') || '16px';
      const fontFamily = getStyle(element, 'font-family') || 'Inter, sans-serif';
      return `${fontWeight} ${fontSize} ${fontFamily}`;
    }

    function computeMaxChar(percent = 100) {
      if (percent < 1 || percent > 100) {
        throw new Error('Invalid fill percentage!');
      }

      const fontSize = parseInt(getStyle(portraitText, 'font-size').match(/\d+/)[0], 10);
      const maxLineY = Math.floor((window.innerHeight / fontSize) * (percent / 100));
      const maxCharX = Math.floor(window.innerWidth / (getFontTextWidthAverage(getFontDescriptors(portraitText)) - 1));

      return Math.ceil(maxCharX * maxLineY);
    }

    function setText() {
      const maxChar = computeMaxChar();
      portraitText.textContent = `${portraitTextSource} `.repeat(Math.ceil(maxChar / textCount)).substring(0, maxChar + 1);
    }

    window.addEventListener('load', setText);
    window.addEventListener('resize', setText);
  </script>
</body>
</html>
