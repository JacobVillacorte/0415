<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portrait for Us</title>
  <meta name="description" content="A portrait page for our anniversary.">
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #030303;
      --bg-2: #111111;
      --bg-3: #1f1f1f;
      --ink: #f4f4f4;
      --soft: #cfcfcf;
      --accent: #ffffff;
      --portrait-w: 3;
      --portrait-h: 4;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Consolas, "Courier New", monospace;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.08), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      overflow: hidden;
    }

    .frame {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      padding: 1rem;
    }

    .topbar,
    .controls,
    .hint {
      width: min(1000px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.35rem 0;
    }

    a, button, input { font: inherit; }

    .back {
      color: var(--ink);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.6rem 1rem;
      border-radius: 999px;
    }

    .title {
      margin: 0;
      font-size: clamp(1rem, 2.6vw, 1.35rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .portrait-stage {
      width: min(1000px, 100%);
      margin: 0 auto;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.62);
      overflow: hidden;
      position: relative;
    }

    .portrait-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, transparent 35%, rgba(0, 0, 0, 0.18) 100%);
      pointer-events: none;
      z-index: 5;
    }

    .portrait-wrap {
      min-height: 70svh;
      display: grid;
      place-items: center;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
      position: relative;
      background: #000;
    }

    .portrait-wrap:active {
      cursor: grabbing;
    }

    .text-layer {
      width: min(92vw, 820px);
      aspect-ratio: calc(var(--portrait-w) / var(--portrait-h));
      overflow: hidden;
      transform-origin: center center;
      will-change: transform;
      position: relative;
    }

    .text-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.22)),
        radial-gradient(circle at 50% 50%, transparent 62%, rgba(0,0,0,0.34));
    }

    .portrait-text {
      margin: 0;
      overflow: hidden;
      overflow-anchor: none;
      font-size: 11px;
      line-height: 11px;
      letter-spacing: 0;
      text-align: justify;
      white-space: normal;
      word-break: normal;
      overflow-wrap: normal;
      color: transparent;
      -webkit-text-fill-color: transparent;
      background-image: url("./picjah1.png");
      background-attachment: fixed;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      -webkit-background-clip: text;
      background-clip: text;
      filter: brightness(0.83) grayscale(1) contrast(1.24);
      transform: translateZ(0);
    }

    .portrait-text.ultra {
      font-size: 9px;
      line-height: 9px;
      filter: brightness(0.8) grayscale(1) contrast(1.3);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding-bottom: 0.5rem;
    }

    .controls button {
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.06);
      padding: 0.65rem 1rem;
      border-radius: 999px;
      cursor: pointer;
    }

    .controls button:hover { background: rgba(255, 255, 255, 0.12); }

    .controls input[type="range"] {
      width: min(380px, 78vw);
      accent-color: var(--accent);
    }

    .hint {
      margin: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
      .frame { padding: 0.8rem; }
      .portrait-wrap { min-height: 62svh; }
      .portrait-text {
        font-size: 8.4px;
        line-height: 5.8px;
      }
      .portrait-text.ultra {
        font-size: 7px;
        line-height: 4.8px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="topbar">
      <a class="back" href="index.html">Back to anniversary</a>
      <h1 class="title">Portrait memory</h1>
      <div></div>
    </div>

    <div class="portrait-stage">
      <div id="portraitWrap" class="portrait-wrap">
        <div id="textLayer" class="text-layer" aria-label="Portrait memory">
            <p id="portraitText" class="portrait-text">Loading portrait text...</p>
        </div>
      </div>
    </div>

    <div class="controls" aria-label="Portrait controls">
      <button id="zoomOutBtn" type="button">Zoom out</button>
      <input id="zoomRange" type="range" min="0.7" max="7" step="0.01" value="1" aria-label="Zoom level" />
      <button id="zoomInBtn" type="button">Zoom in</button>
      <button id="resetBtn" type="button">Reset</button>
      <button id="qualityToggleBtn" type="button">Quality: Standard</button>
    </div>
    <p class="hint">Zoom out for the full photo look, zoom in to reveal repeated "I love you" text.</p>
  </div>

  <script src="config.js"></script>
  <script>
    const wrap = document.getElementById('portraitWrap');
    const textLayer = document.getElementById('textLayer');
    const portraitText = document.getElementById('portraitText');
    const zoomRange = document.getElementById('zoomRange');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetBtn = document.getElementById('resetBtn');
    const qualityToggleBtn = document.getElementById('qualityToggleBtn');

    const imagePath = './picjah1.png';
    const portraitTextSource = (
      (window.ANNIVERSARY_CONFIG && window.ANNIVERSARY_CONFIG.portraitText) ||
      'i love you i love you i love you i love you i love you i love you i love you i love you i love you i love you i love you i love you'
    ).replace(/\s+/g, ' ').trim();

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let ultraMode = false;

    let activePointers = new Map();
    let dragPointerId = null;
    let panStartX = 0;
    let panStartY = 0;
    let originOffsetX = 0;
    let originOffsetY = 0;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;

    function getTextWidth(text, font) {
      const measureCanvas = getTextWidth.canvas || (getTextWidth.canvas = document.createElement('canvas'));
      const context = measureCanvas.getContext('2d');
      context.font = font;
      return context.measureText(text).width;
    }

    function getFontAverageWidth(font) {
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ .,!?';
      let total = 0;
      for (const char of chars) {
        total += getTextWidth(char, font);
      }
      return Math.max(1, total / chars.length);
    }

    function computeMaxChar() {
      const styles = window.getComputedStyle(portraitText);
      const fontSize = parseFloat(styles.fontSize || '10');
      const font = `${styles.fontWeight} ${styles.fontSize} ${styles.fontFamily}`;
      const avgWidth = getFontAverageWidth(font);
      const width = textLayer.clientWidth;
      const height = textLayer.clientHeight;
      const columns = Math.max(1, Math.floor(width / avgWidth));
      const rows = Math.max(1, Math.floor(height / fontSize));
      return Math.ceil(columns * rows * 2.6);
    }

    function buildText() {
      portraitText.classList.toggle('ultra', ultraMode);

      const source = `${portraitTextSource} `;
      const maxChar = computeMaxChar();
      const repeatCount = Math.max(2, Math.ceil(maxChar / source.length));
      portraitText.textContent = source.repeat(repeatCount).substring(0, maxChar + 1);
    }

    function applyTransform() {
      zoomRange.value = String(scale);
      textLayer.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    function resetView() {
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      applyTransform();
    }

    function clampScale(value) {
      return Math.min(7, Math.max(0.7, value));
    }

    function setDragOrigin(pointerId, x, y) {
      dragPointerId = pointerId;
      panStartX = x;
      panStartY = y;
      originOffsetX = offsetX;
      originOffsetY = offsetY;
    }

    function updateFromPointers() {
      if (activePointers.size === 1 && dragPointerId !== null) {
        const point = activePointers.get(dragPointerId);
        if (!point) return;
        offsetX = originOffsetX + (point.x - panStartX);
        offsetY = originOffsetY + (point.y - panStartY);
        applyTransform();
        return;
      }

      if (activePointers.size >= 2) {
        const points = Array.from(activePointers.values());
        const distance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        if (!pinchStartDistance) {
          pinchStartDistance = distance;
          pinchStartScale = scale;
        }
        scale = clampScale(pinchStartScale * (distance / pinchStartDistance));
        applyTransform();
      }
    }

    zoomRange.addEventListener('input', () => {
      scale = clampScale(Number(zoomRange.value));
      applyTransform();
    });

    zoomInBtn.addEventListener('click', () => {
      scale = clampScale(scale + 0.12);
      applyTransform();
    });

    zoomOutBtn.addEventListener('click', () => {
      scale = clampScale(scale - 0.12);
      applyTransform();
    });

    resetBtn.addEventListener('click', resetView);

    qualityToggleBtn.addEventListener('click', () => {
      ultraMode = !ultraMode;
      qualityToggleBtn.textContent = ultraMode ? 'Quality: Ultra' : 'Quality: Standard';
      const currentScale = scale;
      buildText();
      scale = currentScale;
      applyTransform();
    });

    wrap.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

      if (activePointers.size === 1) {
        setDragOrigin(event.pointerId, event.clientX, event.clientY);
        wrap.setPointerCapture(event.pointerId);
      }

      if (activePointers.size === 2) {
        const points = Array.from(activePointers.values());
        pinchStartDistance = Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
        pinchStartScale = scale;
      }
    });

    wrap.addEventListener('pointermove', (event) => {
      const point = activePointers.get(event.pointerId);
      if (!point) return;
      point.x = event.clientX;
      point.y = event.clientY;
      activePointers.set(event.pointerId, point);
      updateFromPointers();
    });

    wrap.addEventListener('pointerup', (event) => {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 1) {
        const remaining = Array.from(activePointers.entries())[0];
        if (remaining) {
          dragPointerId = remaining[0];
          panStartX = remaining[1].x;
          panStartY = remaining[1].y;
          originOffsetX = offsetX;
          originOffsetY = offsetY;
        }
      } else if (activePointers.size === 0) {
        dragPointerId = null;
        pinchStartDistance = 0;
        pinchStartScale = 1;
      }
    });

    wrap.addEventListener('pointercancel', (event) => {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 0) {
        dragPointerId = null;
        pinchStartDistance = 0;
        pinchStartScale = 1;
      }
    });

    wrap.addEventListener('wheel', (event) => {
      event.preventDefault();
      scale = clampScale(scale + (event.deltaY < 0 ? 0.08 : -0.08));
      applyTransform();
    }, { passive: false });

    const previewImage = new Image();
    previewImage.onload = () => {
      document.documentElement.style.setProperty('--portrait-w', String(previewImage.naturalWidth || 3));
      document.documentElement.style.setProperty('--portrait-h', String(previewImage.naturalHeight || 4));
      portraitText.style.backgroundImage = `url(${imagePath})`;
      buildText();
      resetView();
    };
    previewImage.src = imagePath;

    window.addEventListener('resize', buildText);
  </script>
</body>
</html>
